<body>

<header>

    <div class="logo-naslov">
        <img src="logovoce.png" alt="Logo manifestacije Plodovi Rađevine">
        <h1>Plodovi Rađevine</h1>
    </div>

    <div class="hamburger" onclick="toggleMenu()">☰</div>

    <nav id="meni">

        <a href="index.html">Početna</a>

        <a href="onama.html">O nama</a>

        <div class="dropdown">

            <button class="dropbtn">Proizvodi</button>

            <div class="dropdown-content">
                <a href="proizvodi.html">Svi proizvodi</a>
                <a href="#">Voće</a>
                <a href="#">Med</a>

                <a href="#">Zimnica</a>

            </div>

        <a href="kontakt.html">Kontakt</a>

        <button onclick="promeniTemu()">Tema</button>
        <button onclick="veciFont()">A+</button>
        <button onclick="manjiFont()">A-</button>

    </nav>

</header>

<section>

    <h2>Kontaktirajte nas</h2>

    <form id="kontaktForma">

        <input
            type="text"
            id="ime"
            placeholder="Unesite ime"
            required
            minlength="2">

        <input
            type="email"
            id="email"
            placeholder="Unesite email adresu"
            required>

        <textarea
            id="poruka"
            placeholder="Vaša poruka"
            required
            minlength="10"></textarea>

        <button type="submit">
            Pošalji
        </button>

        <div>
            <a href="poruke.html">
                Pregled poruka
            </a>
        </div>

    </form>

</section>
