<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poruke</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff5e6;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .poruka {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid #8b0000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .poruka h3 {
            margin: 0;
        }

        .email {
            color: gray;
            font-size: 14px;
        }

        .datum {
            font-size: 12px;
            color: #888;
        }

        .btn {
            display: block;
            margin: 20px auto;
            padding: 10px 15px;
            background: #8b0000;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>Primljene poruke</h1>

    <div class="container" id="listaPoruka"></div>

    <button class="btn" onclick="obrisiPoruke()">Obriši sve poruke</button>

    <script>
        function prikaziPoruke() {

            let lista = document.getElementById("listaPoruka");

            let poruke = JSON.parse(localStorage.getItem("poruke")) || [];

            if (poruke.length === 0) {
                lista.innerHTML = "<p>Nema poruka.</p>";
                return;
            }

            lista.innerHTML = "";

            poruke.forEach(function (p) {

                let div = document.createElement("div");
                div.classList.add("poruka");

                div.innerHTML = `
                    <h3>${p.ime}</h3>
                    <div class="email">${p.email}</div>
                    <p>${p.poruka}</p>
                    <div class="datum">${p.datum}</div>
                `;

                lista.appendChild(div);
            });
        }

        function obrisiPoruke() {
            if (confirm("Da li želite da obrišete sve poruke?")) {
                localStorage.removeItem("poruke");
                prikaziPoruke();
            }
        }

        prikaziPoruke();
    </script>

</body>

</html>
